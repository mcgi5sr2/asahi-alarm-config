# ─────────────────────────────────────────────────────────────
#  VS Code Dark Modern Theme
# ─────────────────────────────────────────────────────────────

# ── Font ──────────────────────────────────────────────────────
font_family      Source Code Pro
bold_font        Source Code Pro Bold
italic_font      auto
bold_italic_font auto
font_size        10.5

# ── Cursor ────────────────────────────────────────────────────
cursor                     #aeafad
cursor_text_color          background
cursor_shape               block
cursor_blink_interval      -1
cursor_stop_blinking_after 15.0

# ── VS Code Dark+ Colour Palette ─────────────────────────────
background            #1e1e1e
foreground            #d4d4d4

color0   #1e1e1e
color8   #555555

color1   #f44747
color9   #f44747

color2   #6a9955
color10  #b5cea8

color3   #d7ba7d
color11  #d7ba7d

color4   #569cd6
color12  #9cdcfe

color5   #c586c0
color13  #c586c0

color6   #4ec9b0
color14  #4fc1ff

color7   #d4d4d4
color15  #ffffff

selection_background  #264f78
selection_foreground  #d4d4d4

# ── Window ────────────────────────────────────────────────────
window_padding_width        10
window_border_width         1pt
active_border_color         #007acc
inactive_border_color       #3c3c3c
draw_minimal_borders        yes

# Hide title bar decorations for a cleaner look (Wayland/X11)
hide_window_decorations     no

# Remember window size between sessions
remember_window_size        yes

# ── Tab Bar ───────────────────────────────────────────────────
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            1
tab_bar_edge                top
active_tab_foreground       #ffffff
active_tab_background       #007acc
active_tab_font_style       bold
inactive_tab_foreground     #969696
inactive_tab_background     #2d2d2d
inactive_tab_font_style     normal
tab_bar_background          #1e1e1e

# ── URLs ──────────────────────────────────────────────────────
url_color                   #4ec9b0
url_style                   curly

# ── Bell ──────────────────────────────────────────────────────
enable_audio_bell           no
visual_bell_duration        0.1
visual_bell_color           #264f78

# ── Scrollback ────────────────────────────────────────────────
scrollback_lines            10000
# Use less as a scrollback pager with colour support
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER

# ── Mouse ─────────────────────────────────────────────────────
mouse_hide_wait             2.0
copy_on_select              yes
# Faster scrolling with mouse wheel
wheel_scroll_multiplier     5.0
wheel_scroll_min_lines      1

# ── Performance ───────────────────────────────────────────────
# Lower repaint delay = more responsive feel (default 10ms)
repaint_delay               8
# Reduce input delay so keystrokes feel instant
input_delay                 1
# Sync to monitor refresh rate to avoid tearing
sync_to_monitor             yes

# ── Shell Integration ─────────────────────────────────────────
# Enables: jump to prev/next prompt, clone with cwd, etc.
shell_integration           enabled

# Notify when a long-running command finishes (>30s)
notify_on_cmd_finish        unfocused 30.0

# ── Remote Control ────────────────────────────────────────────
# Allows kitty @ commands and kittens (e.g. icat, ssh)
allow_remote_control        socket-only
listen_on                   unix:/tmp/kitty

# ── Clipboard ─────────────────────────────────────────────────
# Sanitise pastes to avoid bracket-paste injection
paste_actions               quote-urls-at-prompt,confirm-if-large

# ── Misc ──────────────────────────────────────────────────────
strip_trailing_spaces       smart
confirm_os_window_close     0

# Don't phone home for update checks
update_check_interval       0
