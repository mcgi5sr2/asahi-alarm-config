# ~/.config/tmux/tmux.conf

# --- Mouse ---
set -g mouse on                 # click panes, drag borders, scroll, select windows

# --- Sane defaults ---
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gapless
set -g history-limit 50000      # bigger scrollback
set -sg escape-time 10          # snappier ESC in editors
set -g focus-events on
set -g default-terminal "tmux-256color"

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# Toggle a yazi file-tree pane on the left with prefix + e
bind e split-window -hb -l 30 "yazi"

# More intuitive splits: | horizontal, - vertical (opens in same dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
