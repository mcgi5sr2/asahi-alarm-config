general {
    hide_cursor = true
}

background {
    monitor =
    path = /home/mcgi5sr2/Videos/wallpapers/250956.mp4
    color = rgba(1a1510ff)
    blur_passes = 1
    blur_size = 4
    brightness = 0.6
    vibrancy = 0.12
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    color = rgba(f0c9a0ff)
    font_size = 56
    font_family = Noto Sans Light
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(00000055)
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    color = rgba(9ab0a8cc)
    font_size = 15
    font_family = Noto Sans
    shadow_passes = 1
    shadow_size = 3
    shadow_color = rgba(00000044)
    position = 0, 100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:3600000] echo "$USER"
    color = rgba(9a8878aa)
    font_size = 12
    font_family = Noto Sans
    position = 0, 70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 44
    outline_thickness = 1
    dots_size = 0.22
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(e0706055)
    inner_color = rgba(1a1510cc)
    font_color = rgba(f0c9a0ff)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <i>Password</i>
    hide_input = false
    rounding = 8
    check_color = rgba(e07060ff)
    fail_color = rgba(f38ba8ff)
    fail_text = <i>$FAIL ($ATTEMPTS)</i>
    capslock_color = rgba(e8907aff)
    fail_timeout = 2000
    position = 0, -60
    halign = center
    valign = center
}
