$font = FiraCode Nerd Font

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

# Blurred screenshot of the current desktop as the background.
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.55
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 80
    font_family = $font
    color = rgba(1793d1ff)

    position = 0, 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 22
    font_family = $font
    color = rgba(1793d1cc)

    position = 0, 20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    inner_color = rgba(0f1620cc)

    outer_color = rgba(1793d1ff)
    check_color = rgba(1793d1ff)
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg

    font_color = rgba(e6ebf2ff)
    font_family = $font
    fade_on_empty = true
    rounding = 10

    placeholder_text = <i>Enter password...</i>
    fail_text = <b>$PAMFAIL</b>

    dots_spacing = 0.3
    dots_size = 0.3

    position = 0, -100
    halign = center
    valign = center
}
