general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false  # respects media players that send inhibit signals
}

# 30 seconds: drop refresh rate
listener {
    timeout = 30
    on-timeout = ~/.config/hypr/display-hz.sh idle
    on-resume = ~/.config/hypr/display-hz.sh active
}

# 5 minutes: lock screen
listener {
    timeout = 300
    on-timeout = pidof hyprlock || hyprlock
}

# 15 minutes: turn off displays
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 1 hour: shutdown
listener {
    timeout = 3600
    on-timeout = systemctl poweroff
}
