splash = false
ipc = on

# Native directory rotation (hyprpaper 0.8+).
# - timeout: seconds between swaps (300 = 5 min)
# - order:   default | random | random-shuffle
# - monitor: empty string = apply to all connected outputs
wallpaper {
    monitor =
    path = /home/mcgi5sr2/Pictures/Wallpapers/
    fit_mode = cover
    order = random-shuffle
    timeout = 300
}
