source = ~/.config/hypr/config/colors.conf

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 3
    col.active_border = $archblue_clear $archblue_soft 90deg
    col.inactive_border = $archblue_subtle
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.93

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 15
        passes = 2
        xray = true
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
