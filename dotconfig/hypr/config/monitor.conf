monitor=eDP-1,3024x1890@120,0x0,1.5
monitor=HDMI-A-1,3840x2160@60,auto,1.5
monitor=,preferred,auto,auto

# Asahi: displays not always ready at startup — reload forces correct scale
exec-once = sleep 3 && hyprctl reload

# Lid switch actions
bindl=,switch:on:Apple SMC power/lid events, exec, hyprlock
bindl=,switch:on:Apple SMC power/lid events, exec, hyprctl dispatch dpms off
bindl=,switch:off:Apple SMC power/lid events, exec, hyprctl dispatch dpms on
