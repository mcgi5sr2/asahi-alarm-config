# Window Rules — block syntax for Hyprland 0.50+
# https://wiki.hyprland.org/Configuring/Window-Rules/

# ── Float necessary windows ─────────────────────────────────────
windowrule {
    name = float-pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = true
}
windowrule {
    name = float-pip-noclass
    match:class = ^()$
    match:title = ^(Picture in picture)$
    float = true
}
windowrule {
    name = float-savefile
    match:class = ^()$
    match:title = ^(Save File)$
    float = true
}
windowrule {
    name = float-openfile
    match:class = ^()$
    match:title = ^(Open File)$
    float = true
}
windowrule {
    name = float-librewolf-pip
    match:class = ^(LibreWolf)$
    match:title = ^(Picture-in-Picture)$
    float = true
}
windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = true
}
windowrule {
    name = float-portals
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
    float = true
}
windowrule {
    name = float-polkit
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$
    float = true
}
windowrule {
    name = float-cachyhello
    match:class = ^(CachyOSHello)$
    float = true
}
windowrule {
    name = float-zenity
    match:class = ^(zenity)$
    float = true
}
windowrule {
    name = float-steam-updater
    match:class = ^()$
    match:title = ^(Steam - Self Updater)$
    float = true
}

# ── Opacity tweaks ──────────────────────────────────────────────
windowrule {
    name = opacity-thunar-nemo
    match:class = ^(thunar|nemo)$
    opacity = 0.92
}
windowrule {
    name = opacity-discord
    match:class = ^(discord|armcord|webcord)$
    opacity = 0.96
}
windowrule {
    name = opacity-qq-telegram
    match:title = ^(QQ|Telegram)$
    opacity = 0.95
}
windowrule {
    name = opacity-netease
    match:title = ^(NetEase Cloud Music Gtk4)$
    opacity = 0.95
}

# ── Picture-in-Picture: float, sized, offset ────────────────────
windowrule {
    name = pip-shape
    match:title = ^(Picture-in-Picture)$
    float = true
    size = 960 540
    move = 25%-
}

# ── Floats with size + position ─────────────────────────────────
windowrule {
    name = media-floats
    match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
    float = true
    size = 960 540
    move = 25%-
}

# ── Misc decoration tweaks ──────────────────────────────────────
windowrule {
    name = pin-danmufloat
    match:title = ^(danmufloat)$
    pin = true
}
windowrule {
    name = round-floats
    match:title = ^(danmufloat|termfloat)$
    rounding = 5
}
windowrule {
    name = anim-terminal
    match:class = ^(kitty|Alacritty)$
    animation = slide right
}
# noblur on Firefox: dropped — field name unsupported in Hyprland 0.54.3
# windowrule {
#     name = noblur-firefox
#     match:class = ^(org.mozilla.firefox)$
#     noblur = true
# }

# ── Floating windows on workspaces 1-10 ─────────────────────────
# bordersize/bordercolor are global-only in Hyprland 0.54.3 (not per-rule),
# so this block now only adjusts rounding for floats.
windowrule {
    name = floating-deco
    match:float = true
    match:workspace = w[fv1-10]
    rounding = 8
}

# ── Tiling windows on workspaces 1-10 ───────────────────────────
windowrule {
    name = tiling-deco
    match:float = false
    match:workspace = f[1-10]
    rounding = 4
}

# ── Workspace rules (smart gaps) ────────────────────────────────
workspace = w[tv1-10], gapsout:5, gapsin:3
workspace = f[1],      gapsout:5, gapsin:3

# ── Layer rules ─────────────────────────────────────────────────
# (flat layerrule syntax was rejected by 0.54.3's parser; restore
#  these once a block-syntax equivalent is documented upstream)
